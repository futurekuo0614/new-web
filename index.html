<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Deal Sourcing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0e0f11;
  --bg2:     #141618;
  --bg3:     #1c1f23;
  --border:  #252930;
  --border2: #2e3440;
  --accent:  #00e5a0;
  --accent2: #00e5a022;
  --accent3: #00e5a055;
  --amber:   #f5a623;
  --red:     #e55353;
  --text:    #d4dae6;
  --muted:   #5a6478;
  --muted2:  #3a4050;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: -1px -1px;
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 30px; height: 30px; border-radius: 6px;
  background: var(--accent); display: grid; place-items: center;
  font-size: 14px; color: var(--bg); font-weight: 700;
}
.logo-text { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
.logo-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 20px; }
.live { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--accent); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.clock { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }

/* ── LAYOUT ── */
.page { max-width: 1280px; margin: 0 auto; padding: 32px 32px 60px; }

/* ── SECTION TITLE ── */
.section-title {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 2.5px; text-transform: uppercase;
  margin-bottom: 14px; padding-left: 2px;
}

/* ── STAT CARDS ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
.stat-card { background: var(--bg2); padding: 22px 24px; display: flex; flex-direction: column; gap: 8px; }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.stat-num { font-family: var(--mono); font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: -1px; line-height: 1; }
.stat-num.accent { color: var(--accent); }
.stat-num.amber  { color: var(--amber); }
.stat-sub { font-size: 11px; color: var(--muted); }

/* ── MAIN GRID ── */
.main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-bottom: 24px; }

/* ── PANEL ── */
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.5px; color: var(--text); }
.panel-count { font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent2); padding: 2px 8px; border-radius: 4px; }
.panel-body { padding: 20px; }

/* ── CONTROL PANEL ── */
.ctrl-row { margin-bottom: 20px; }
.ctrl-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.ctrl-value { font-size: 13px; color: var(--text); line-height: 1.6; }
.ctrl-value.ok   { color: var(--accent); }
.ctrl-value.warn { color: var(--amber); }
.ctrl-value.err  { color: var(--red); }

.btn-run {
  width: 100%; padding: 13px; border-radius: 8px;
  border: 1px solid var(--accent3); background: var(--accent2);
  color: var(--accent); font-family: var(--mono); font-size: 12px;
  font-weight: 500; cursor: pointer; letter-spacing: 0.5px;
  transition: all 0.2s; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-run:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
.btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-refresh {
  width: 100%; padding: 10px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all 0.2s;
}
.btn-refresh:hover { border-color: var(--accent3); color: var(--accent); }

/* ── PROGRESS BAR ── */
.progress-wrap { margin-top: 14px; display: none; }
.progress-wrap.show { display: block; }
.progress-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.5s; animation: prog 3s linear infinite; }
@keyframes prog { 0%{width:5%} 80%{width:90%} 100%{width:95%} }

/* ── MSG BANNER ── */
.msg { padding: 12px 16px; border-radius: 8px; font-size: 12px; line-height: 1.6; margin-bottom: 20px; font-family: var(--mono); display: none; }
.msg.show { display: block; }
.msg.ok   { background: #0d2b1f; color: var(--accent); border: 1px solid #1a4d38; }
.msg.err  { background: #2b0d0d; color: var(--red);    border: 1px solid #4d1a1a; }
.msg.info { background: #1f1e0d; color: var(--amber);  border: 1px solid #4d480d; }

/* ── STARTUP LIST ── */
.startup-item {
  padding: 14px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: padding-left 0.15s;
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.startup-item:last-child { border-bottom: none; }
.startup-item:hover { padding-left: 6px; }
.startup-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.startup-desc { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.startup-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; }
.badge-stage { background: #1a2535; color: #63b3ed; border: 1px solid #1e3a52; }
.badge-score-hi { background: #0d2b1f; color: var(--accent); border: 1px solid #1a4d38; }
.badge-score-md { background: #2b220d; color: var(--amber); border: 1px solid #4d3e0d; }
.badge-score-lo { background: #1a1e2b; color: var(--muted); border: 1px solid #2a3040; }
.badge-tag  { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
.badge-fund { font-family: var(--mono); font-size: 10px; color: var(--muted); }

/* ── LOADING SPINNER ── */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── EMPTY ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-family: var(--mono); font-size: 12px; line-height: 2; }

/* ── STARTUPS FULL PANEL ── */
.startups-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

@media(max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">DS</div>
    <div>
      <div class="logo-text">AI Deal Sourcing</div>
      <div class="logo-sub">台灣新創融資雷達</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="page">

  <!-- MSG -->
  <div class="msg" id="msg"></div>

  <!-- STATS -->
  <div class="section-title">系統概覽</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">新創總數</div>
      <div class="stat-num accent" id="st-total"><span class="spinner"></span></div>
      <div class="stat-sub" id="st-sub">載入中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均適配分</div>
      <div class="stat-num" id="st-score"><span class="spinner"></span></div>
      <div class="stat-sub">滿分 10 分</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">上次執行</div>
      <div class="stat-num amber" id="st-time" style="font-size:16px;padding-top:8px">—</div>
      <div class="stat-sub" id="st-dur">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">爬蟲狀態</div>
      <div class="stat-num" id="st-status" style="font-size:16px;padding-top:8px;color:var(--muted)">載入中</div>
      <div class="stat-sub" id="st-sources">—</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT: latest startups -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">最新新創</span>
        <span class="panel-count" id="startup-count">—</span>
      </div>
      <div class="panel-body" id="startups-content">
        <div class="empty"><div class="spinner"></div><br>載入中...</div>
      </div>
    </div>

    <!-- RIGHT: control -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <div class="panel">
        <div class="panel-head"><span class="panel-title">爬蟲控制</span></div>
        <div class="panel-body">
          <button class="btn-run" id="trigger-btn" onclick="triggerCrawler()">
            ▶ 立即執行爬蟲
          </button>
          <button class="btn-refresh" onclick="refreshData()">↺ 重新整理資料</button>
          <div class="progress-wrap" id="progress-wrap">
            <div class="progress-label">
              <span>執行中...</span>
              <span id="elapsed-label">0s</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span class="panel-title">系統狀態</span></div>
        <div class="panel-body" id="status-detail">
          <div class="empty" style="padding:16px 0"><span class="spinner"></span></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span class="panel-title">融資輪次分佈</span></div>
        <div class="panel-body" id="stage-dist">
          <div class="empty" style="padding:16px 0"><span class="spinner"></span></div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
const WEB_APP_URL = '/api/proxy';

// Clock
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('zh-TW', { hour12: false });
}
tick(); setInterval(tick, 1000);

// Init
window.addEventListener('load', function() {
  refreshData();
  setInterval(refreshData, 120000); // 每 2 分鐘更新，避免請求堆積
});

function refreshData() { loadStatus(); loadStats(); loadLatestStartups(); }

// ── MSG ──
function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.className = 'msg show ' + type;
  el.innerHTML = text;
}
function hideMsg() {
  var el = document.getElementById('msg');
  el.className = 'msg';
}

// ── STATUS ──
function fetchWithTimeout(url, opts, ms) {
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, ms || 15000);
  var options = Object.assign({}, opts || {}, { signal: ctrl.signal });
  return fetch(url, options).finally(function() { clearTimeout(timer); });
}

function loadStatus() {
  fetchWithTimeout(WEB_APP_URL + '?action=status', {}, 15000)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status !== 'success') return;
      var lr = data.data.lastRun;
      var cr = data.data.crawler;

      // topbar stats
      var statusEl = document.getElementById('st-status');
      if (lr.success) {
        statusEl.textContent = '正常';
        statusEl.style.color = 'var(--accent)';
      } else if (lr.error) {
        statusEl.textContent = '異常';
        statusEl.style.color = 'var(--red)';
      } else {
        statusEl.textContent = '待執行';
        statusEl.style.color = 'var(--muted)';
      }
      document.getElementById('st-sources').textContent =
        '啟用來源 ' + cr.activeScrapers + ' / ' + cr.sources + ' 個';

      if (lr.completedAt) {
        var d = new Date(lr.completedAt);
        document.getElementById('st-time').textContent =
          (d.getMonth()+1) + '/' + d.getDate() + ' ' +
          d.toLocaleTimeString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit'});
      }
      if (lr.durationSeconds) {
        document.getElementById('st-dur').textContent =
          '耗時 ' + lr.durationSeconds.toFixed(1) + ' 秒';
      }

      // detail panel
      var rows = [
        ['狀態', lr.success ? '<span style="color:var(--accent)">✓ 成功</span>' : (lr.error ? '<span style="color:var(--red)">✗ 失敗</span>' : '—')],
        ['最後執行', lr.completedAt ? new Date(lr.completedAt).toLocaleString('zh-TW') : '尚未執行'],
        ['執行耗時', lr.durationSeconds ? lr.durationSeconds.toFixed(2) + ' 秒' : '—'],
        ['錯誤訊息', lr.error ? '<span style="color:var(--red);font-size:10px">' + lr.error.substring(0,60) + '</span>' : '—'],
      ];
      document.getElementById('status-detail').innerHTML = rows.map(function(r) {
        return '<div class="ctrl-row" style="margin-bottom:12px">' +
          '<div class="ctrl-label">' + r[0] + '</div>' +
          '<div class="ctrl-value" style="font-size:12px;font-family:var(--mono)">' + r[1] + '</div>' +
          '</div>';
      }).join('');
    })
    .catch(function(e) { console.error('status error:', e); });
}

// ── STATS ──
function loadStats() {
  fetchWithTimeout(WEB_APP_URL + '?action=stats', {}, 15000)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status !== 'success') return;
      var s = data.data;

      document.getElementById('st-total').textContent = s.totalStartups || 0;
      document.getElementById('st-score').textContent = (s.avgFitScore || 0) + ' / 10';
      document.getElementById('st-sub').textContent =
        '高適配 ' + (s.fitDistribution ? s.fitDistribution.high : 0) + ' 家';

      // stage dist
      var stageEl = document.getElementById('stage-dist');
      var dist = s.stageDistribution || {};
      var keys = Object.keys(dist);
      if (keys.length === 0) {
        stageEl.innerHTML = '<div class="empty" style="padding:10px 0;font-size:11px">尚無資料</div>';
      } else {
        var max = Math.max.apply(null, keys.map(function(k) { return dist[k]; }));
        stageEl.innerHTML = keys.map(function(k) {
          var pct = Math.round(dist[k] / max * 100);
          return '<div style="margin-bottom:12px">' +
            '<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;margin-bottom:5px">' +
            '<span style="color:var(--muted)">' + k + '</span>' +
            '<span style="color:var(--text)">' + dist[k] + '</span></div>' +
            '<div style="height:3px;background:var(--bg3);border-radius:2px">' +
            '<div style="height:100%;width:' + pct + '%;background:var(--accent);border-radius:2px;transition:width 0.6s"></div>' +
            '</div></div>';
        }).join('');
      }
    })
    .catch(function(e) { console.error('stats error:', e); });
}

// ── STARTUPS ──
function loadLatestStartups() {
  fetchWithTimeout(WEB_APP_URL + '?action=latest', {}, 15000)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById('startups-content');
      var countEl = document.getElementById('startup-count');

      if (data.status !== 'success' || data.count === 0) {
        el.innerHTML = '<div class="empty">尚無新創資料<br><span style="font-size:10px">執行爬蟲後資料將顯示於此</span></div>';
        countEl.textContent = '0 筆';
        return;
      }

      countEl.textContent = data.count + ' 筆';

      el.innerHTML = data.data.map(function(s, i) {
        var score = parseFloat(s.fitScore) || 0;
        var scoreCls = score >= 8 ? 'badge-score-hi' : score >= 5 ? 'badge-score-md' : 'badge-score-lo';
        var tags = (s.fitTags || []).map(function(t) {
          return '<span class="badge badge-tag">' + t + '</span>';
        }).join('');
        var stage = s.stage ? '<span class="badge badge-stage">' + s.stage + '</span>' : '';
        var fund = s.fundingAmountRaw ? '<span class="badge-fund">' + s.fundingAmountRaw + '</span>' : '';

        return '<div class="startup-item" style="animation-delay:' + (i * 0.04) + 's">' +
          '<div class="startup-name">' + (s.companyName || '未知公司') +
          (s.companyNameEn ? ' <span style="color:var(--muted);font-weight:400;font-size:11px">/ ' + s.companyNameEn + '</span>' : '') + '</div>' +
          '<div class="startup-desc">' + (s.description || '暫無描述') + '</div>' +
          '<div class="startup-row">' +
          stage +
          '<span class="badge ' + scoreCls + '">適配 ' + score + '</span>' +
          fund + tags +
          '</div></div>';
      }).join('');
    })
    .catch(function(e) {
      document.getElementById('startups-content').innerHTML =
        '<div class="empty" style="color:var(--red)">載入失敗<br><span style="font-size:10px">' + e.message + '</span></div>';
    });
}

// ── TRIGGER ──
var crawlerTimer = null;
var crawlerSeconds = 0;

function triggerCrawler() {
  var btn = document.getElementById('trigger-btn');
  var prog = document.getElementById('progress-wrap');
  var elapsed = document.getElementById('elapsed-label');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 執行中...';
  prog.classList.add('show');
  crawlerSeconds = 0;
  hideMsg();

  crawlerTimer = setInterval(function() {
    crawlerSeconds++;
    elapsed.textContent = crawlerSeconds + 's';
  }, 1000);

  fetch(WEB_APP_URL, {
    method: 'POST',
    body: new URLSearchParams({ action: 'trigger' }),
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      clearInterval(crawlerTimer);
      btn.disabled = false;
      btn.innerHTML = '▶ 立即執行爬蟲';
      prog.classList.remove('show');
      if (data.status === 'success') {
        showMsg('✓ 執行完成（' + crawlerSeconds + ' 秒）。正在更新資料...', 'ok');
        refreshData();
      } else {
        showMsg('✗ ' + (data.message || '執行失敗'), 'err');
      }
    })
    .catch(function(e) {
      clearInterval(crawlerTimer);
      btn.disabled = false;
      btn.innerHTML = '▶ 立即執行爬蟲';
      prog.classList.remove('show');
      if (crawlerSeconds >= 25) {
        showMsg('⏳ 爬蟲仍在背景執行中（已等 ' + crawlerSeconds + ' 秒）。<br>完成後點「重新整理資料」查看結果。', 'info');
      } else {
        showMsg('✗ 連線失敗：' + e.message, 'err');
      }
    });
}
</script>
</body>
</html>
}
</script>
</body>
</html>
