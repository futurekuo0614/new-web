<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Deal Sourcing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0e0f11;
  --bg2:     #141618;
  --bg3:     #1c1f23;
  --border:  #252930;
  --border2: #2e3440;
  --accent:  #00e5a0;
  --accent2: #00e5a022;
  --accent3: #00e5a055;
  --amber:   #f5a623;
  --red:     #e55353;
  --text:    #d4dae6;
  --muted:   #5a6478;
  --muted2:  #3a4050;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: -1px -1px;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 30px; height: 30px; border-radius: 6px; background: var(--accent); display: grid; place-items: center; font-size: 14px; color: var(--bg); font-weight: 700; }
.logo-text { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.logo-sub  { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 20px; }
.live { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--accent); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.clock { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.page { max-width: 1280px; margin: 0 auto; padding: 32px 32px 60px; }
.section-title { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 14px; padding-left: 2px; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
.stat-card { background: var(--bg2); padding: 22px 24px; display: flex; flex-direction: column; gap: 8px; }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.stat-num { font-family: var(--mono); font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: -1px; line-height: 1; }
.stat-num.accent { color: var(--accent); }
.stat-sub { font-size: 11px; color: var(--muted); }
.main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-bottom: 24px; }
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text); }
.panel-count { font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent2); padding: 2px 8px; border-radius: 4px; }
.panel-body { padding: 20px; }
.btn-run { width: 100%; padding: 13px; border-radius: 8px; border: 1px solid var(--accent3); background: var(--accent2); color: var(--accent); font-family: var(--mono); font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-run:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
.btn-run:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-refresh { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.2s; }
.btn-refresh:hover { border-color: var(--accent3); color: var(--accent); }
.progress-wrap { margin-top: 14px; display: none; }
.progress-wrap.show { display: block; }
.progress-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: prog 3s linear infinite; }
@keyframes prog { 0%{width:5%} 80%{width:90%} 100%{width:95%} }
.msg { padding: 12px 16px; border-radius: 8px; font-size: 12px; line-height: 1.6; margin-bottom: 20px; font-family: var(--mono); display: none; }
.msg.show { display: block; }
.msg.ok   { background: #0d2b1f; color: var(--accent); border: 1px solid #1a4d38; }
.msg.err  { background: #2b0d0d; color: var(--red);    border: 1px solid #4d1a1a; }
.msg.info { background: #1f1e0d; color: var(--amber);  border: 1px solid #4d480d; }
.startup-item { padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: padding-left 0.15s; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.startup-item:last-child { border-bottom: none; }
.startup-item:hover { padding-left: 6px; }
.startup-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.startup-desc { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.startup-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; }
.badge-stage   { background: #1a2535; color: #63b3ed; border: 1px solid #1e3a52; }
.badge-score-hi{ background: #0d2b1f; color: var(--accent); border: 1px solid #1a4d38; }
.badge-score-md{ background: #2b220d; color: var(--amber);  border: 1px solid #4d3e0d; }
.badge-score-lo{ background: #1a1e2b; color: var(--muted);  border: 1px solid #2a3040; }
.badge-tag     { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
.badge-fund    { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-family: var(--mono); font-size: 12px; line-height: 2; }
.ctrl-row { margin-bottom: 14px; }
.ctrl-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
.ctrl-value { font-size: 12px; font-family: var(--mono); color: var(--text); }
@media(max-width:900px){ .main-grid{grid-template-columns:1fr} .stats-row{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">DS</div>
    <div>
      <div class="logo-text">AI Deal Sourcing</div>
      <div class="logo-sub">台灣新創融資雷達</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>

<div class="page">
  <div class="msg" id="msg"></div>

  <div class="section-title">系統概覽</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">新創總數</div>
      <div class="stat-num accent" id="st-total"><span class="spinner"></span></div>
      <div class="stat-sub" id="st-sub">載入中</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均適配分</div>
      <div class="stat-num" id="st-score"><span class="spinner"></span></div>
      <div class="stat-sub">滿分 10 分</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">上次爬蟲</div>
      <div class="stat-num" id="st-time" style="font-size:15px;padding-top:10px;color:var(--amber)">—</div>
      <div class="stat-sub" id="st-dur">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">資料來源</div>
      <div class="stat-num" id="st-sources" style="font-size:20px;padding-top:8px">—</div>
      <div class="stat-sub">啟用中</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">最新新創</span>
        <span class="panel-count" id="startup-count">— 筆</span>
      </div>
      <div class="panel-body" id="startups-content">
        <div class="empty"><span class="spinner"></span><br>載入中...</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="panel">
        <div class="panel-head"><span class="panel-title">爬蟲控制</span></div>
        <div class="panel-body">
          <button class="btn-run" id="trigger-btn" onclick="triggerCrawler()">▶ 立即執行爬蟲</button>
          <button class="btn-refresh" onclick="loadFromFirebase()">↺ 重新整理資料</button>
          <div class="progress-wrap" id="progress-wrap">
            <div class="progress-label"><span>執行中...</span><span id="elapsed-label">0s</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><span class="panel-title">融資輪次分佈</span></div>
        <div class="panel-body" id="stage-dist">
          <div class="empty" style="padding:16px 0"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 設定 ──
var PROJECT_ID = 'web-claw-b779f';
var API_KEY    = 'AIzaSyD46bSwTlD1g94Nc-tqWDfM6MqIY3giE-w';
var GAS_URL    = 'https://script.google.com/macros/s/AKfycbwRe2j2PePE1DMSDxFlYpRS-6FiLzednK3mdcQyIluKLZ3SqSBVJE7eesApoYbpZdJicg/exec';
var FIRESTORE  = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents';

// ── Clock ──
function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }
tick(); setInterval(tick, 1000);

// ── Init ──
window.addEventListener('load', function() {
  loadFromFirebase();
  loadGasStatus();
});

// ── MSG ──
function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.className = 'msg show ' + type;
  el.innerHTML = text;
}

// ── 直接從 Firebase 讀資料 ──
function firestoreQuery(collectionId, query) {
  var url = FIRESTORE + ':runQuery?key=' + API_KEY;
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ structuredQuery: Object.assign({ from: [{ collectionId: collectionId }] }, query) })
  }).then(function(r) { return r.json(); });
}

function fromValue(v) {
  if (!v) return null;
  if (v.nullValue    !== undefined) return null;
  if (v.booleanValue !== undefined) return v.booleanValue;
  if (v.integerValue !== undefined) return parseInt(v.integerValue, 10);
  if (v.doubleValue  !== undefined) return v.doubleValue;
  if (v.stringValue  !== undefined) return v.stringValue;
  if (v.arrayValue   !== undefined) return (v.arrayValue.values || []).map(fromValue);
  if (v.mapValue     !== undefined) return fromFields(v.mapValue.fields);
  return null;
}

function fromFields(fields) {
  if (!fields) return {};
  var result = {};
  Object.keys(fields).forEach(function(k) { result[k] = fromValue(fields[k]); });
  return result;
}

function loadFromFirebase() {
  // 讀最新 20 筆新創
  firestoreQuery('startups', {
    orderBy: [{ field: { fieldPath: 'extractedAt' }, direction: 'DESCENDING' }],
    limit: 20
  }).then(function(result) {
    var startups = [];
    if (Array.isArray(result)) {
      result.forEach(function(item) {
        if (item.document) startups.push(fromFields(item.document.fields));
      });
    }
    renderStartups(startups);
    renderStats(startups);
  }).catch(function(e) {
    document.getElementById('startups-content').innerHTML =
      '<div class="empty" style="color:var(--red)">Firebase 讀取失敗<br><span style="font-size:10px">' + e.message + '</span></div>';
  });
}

function renderStartups(startups) {
  var countEl = document.getElementById('startup-count');
  countEl.textContent = startups.length + ' 筆';

  if (startups.length === 0) {
    document.getElementById('startups-content').innerHTML =
      '<div class="empty">尚無新創資料<br><span style="font-size:10px">執行爬蟲後資料將顯示於此</span></div>';
    return;
  }

  document.getElementById('startups-content').innerHTML = startups.map(function(s, i) {
    var score = parseFloat(s.fitScore) || 0;
    var scoreCls = score >= 8 ? 'badge-score-hi' : score >= 5 ? 'badge-score-md' : 'badge-score-lo';
    var tags = (s.fitTags || []).map(function(t) { return '<span class="badge badge-tag">' + t + '</span>'; }).join('');
    var stage = s.stage ? '<span class="badge badge-stage">' + s.stage + '</span>' : '';
    var fund  = s.fundingAmountRaw ? '<span class="badge-fund">' + s.fundingAmountRaw + '</span>' : '';
    return '<div class="startup-item" style="animation-delay:' + (i*0.04) + 's">' +
      '<div class="startup-name">' + (s.companyName || '未知公司') +
      (s.companyNameEn ? ' <span style="color:var(--muted);font-weight:400;font-size:11px">/ ' + s.companyNameEn + '</span>' : '') + '</div>' +
      '<div class="startup-desc">' + (s.description || '暫無描述') + '</div>' +
      '<div class="startup-row">' + stage + '<span class="badge ' + scoreCls + '">適配 ' + score + '</span>' + fund + tags + '</div>' +
      '</div>';
  }).join('');
}

function renderStats(startups) {
  var total = startups.length;
  var scores = startups.map(function(s) { return parseFloat(s.fitScore) || 0; });
  var avg = total > 0 ? (scores.reduce(function(a,b){return a+b;},0)/total).toFixed(1) : '0';
  var high = scores.filter(function(s){return s>=7;}).length;

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-score').textContent = avg + ' / 10';
  document.getElementById('st-sub').textContent   = '高適配（≥7）' + high + ' 家';

  // 輪次分佈
  var dist = {};
  startups.forEach(function(s) { if (s.stage) dist[s.stage] = (dist[s.stage]||0)+1; });
  var keys = Object.keys(dist);
  var stageEl = document.getElementById('stage-dist');
  if (keys.length === 0) {
    stageEl.innerHTML = '<div class="empty" style="padding:10px 0;font-size:11px">尚無資料</div>';
  } else {
    var max = Math.max.apply(null, keys.map(function(k){return dist[k];}));
    stageEl.innerHTML = keys.map(function(k) {
      var pct = Math.round(dist[k]/max*100);
      return '<div style="margin-bottom:12px">' +
        '<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;margin-bottom:5px">' +
        '<span style="color:var(--muted)">' + k + '</span><span style="color:var(--text)">' + dist[k] + '</span></div>' +
        '<div style="height:3px;background:var(--bg3);border-radius:2px">' +
        '<div style="height:100%;width:' + pct + '%;background:var(--accent);border-radius:2px;transition:width 0.6s"></div>' +
        '</div></div>';
    }).join('');
  }
}

// ── GAS 狀態（只用來顯示上次執行時間）──
function loadGasStatus() {
  var props_url = FIRESTORE + '/logs?key=' + API_KEY + '&orderBy=runAt%20desc&pageSize=1';
  fetch(props_url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.documents && data.documents.length > 0) {
        var log = fromFields(data.documents[0].fields);
        if (log.runAt) {
          var d = new Date(log.runAt);
          document.getElementById('st-time').textContent =
            (d.getMonth()+1) + '/' + d.getDate() + ' ' +
            d.toLocaleTimeString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit'});
        }
        document.getElementById('st-dur').textContent =
          '新增 ' + (log.newArticles||0) + ' 篇';
      }
      // 來源數量從 CONFIG 算（固定顯示）
      document.getElementById('st-sources').textContent = '7';
    })
    .catch(function() {
      document.getElementById('st-time').textContent = '—';
    });
}

// ── 觸發爬蟲（打 GAS）──
var crawlerTimer = null;
var crawlerSeconds = 0;

function triggerCrawler() {
  var btn  = document.getElementById('trigger-btn');
  var prog = document.getElementById('progress-wrap');
  var el   = document.getElementById('elapsed-label');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 執行中...';
  prog.classList.add('show');
  crawlerSeconds = 0;
  showMsg('⏳ 爬蟲啟動中，預計需要 2–3 分鐘，請勿關閉頁面...', 'info');

  crawlerTimer = setInterval(function() {
    crawlerSeconds++;
    el.textContent = crawlerSeconds + 's';
  }, 1000);

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',  // 避免 CORS 問題，用 no-cors 模式觸發即可
    body: new URLSearchParams({ action: 'trigger' }),
  }).then(function() {
    // no-cors 模式下永遠是 opaque response，視為成功
    clearInterval(crawlerTimer);
    btn.disabled = false;
    btn.innerHTML = '▶ 立即執行爬蟲';
    prog.classList.remove('show');
    showMsg('✓ 爬蟲已觸發（' + crawlerSeconds + ' 秒）。3 分鐘後點重新整理查看結果。', 'ok');
  }).catch(function(e) {
    clearInterval(crawlerTimer);
    btn.disabled = false;
    btn.innerHTML = '▶ 立即執行爬蟲';
    prog.classList.remove('show');
    showMsg('✗ 觸發失敗：' + e.message, 'err');
  });
}
</script>
</body>
</html>
</html>
