<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Deal Sourcing — 新創融資雷達</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Kaisei+Tokumin:wght@400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:    #ffffff;
  --bg:       #f7f8fa;
  --bg2:      #ffffff;
  --bg3:      #f0f2f5;
  --border:   #e8eaee;
  --border2:  #d4d8df;
  --mint:     #00b894;
  --mint-lt:  #e8f8f4;
  --mint-md:  #b2ead8;
  --coral:    #e17055;
  --coral-lt: #fdf0ec;
  --blue:     #0984e3;
  --blue-lt:  #e8f4fd;
  --amber:    #e6a817;
  --amber-lt: #fef8e7;
  --purple:   #6c5ce7;
  --purple-lt:#f0eeff;
  --text:     #1a1d23;
  --text2:    #4a5568;
  --muted:    #8896a5;
  --muted2:   #c5cdd6;
  --mono:     'DM Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --serif:    'Kaisei Tokumin', serif;
  --shadow:   0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 36px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--border);
}
.logo { display: flex; align-items: center; gap: 14px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--mint) 0%, #00cec9 100%);
  display: grid; place-items: center;
  box-shadow: 0 4px 12px rgba(0,184,148,.3);
}
.logo-icon svg { width: 18px; height: 18px; fill: white; }
.logo-name { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.logo-tag { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 400; }
.topbar-right { display: flex; align-items: center; gap: 24px; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--mint-lt); border: 1px solid var(--mint-md);
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 600; color: var(--mint);
  font-family: var(--mono); letter-spacing: 0.5px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
.clock { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 1px; }

/* ── PAGE ── */
.page { max-width: 1360px; margin: 0 auto; padding: 32px 36px 80px; }

/* ── SECTION LABEL ── */
.sec-label {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px 24px 20px;
  box-shadow: var(--shadow); transition: box-shadow .2s, transform .2s;
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
.stat-num { font-family: var(--serif); font-size: 40px; font-weight: 700; line-height: 1; letter-spacing: -1.5px; color: var(--text); }
.stat-num.mint   { color: var(--mint); }
.stat-num.coral  { color: var(--coral); }
.stat-num.blue   { color: var(--blue); }
.stat-num.amber  { color: var(--amber); }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ── MSG ── */
.msg { padding: 14px 18px; border-radius: 12px; font-size: 13px; line-height: 1.6; margin-bottom: 24px; display: none; font-weight: 400; }
.msg.show { display: flex; align-items: flex-start; gap: 10px; }
.msg.ok   { background: var(--mint-lt);   color: #00704a; border: 1px solid var(--mint-md); }
.msg.err  { background: #fdecea;           color: #c0392b; border: 1px solid #f5b7b1; }
.msg.info { background: var(--amber-lt);  color: #956a00; border: 1px solid #f8d68e; }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px 24px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.filter-lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-right: 2px; white-space: nowrap; }
.filter-sep { width: 1px; height: 28px; background: var(--border); margin: 0 10px; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); background: transparent; color: var(--text2);
  cursor: pointer; transition: all .15s; font-family: var(--sans);
}
.filter-btn:hover { border-color: var(--mint); color: var(--mint); background: var(--mint-lt); }
.filter-btn.active { border-color: var(--mint); background: var(--mint-lt); color: var(--mint); font-weight: 600; }
.filter-btn.region-cn.active  { border-color: var(--coral); background: var(--coral-lt); color: var(--coral); }
.filter-btn.region-sea.active { border-color: var(--purple); background: var(--purple-lt); color: var(--purple); }
.filter-btn.region-gl.active  { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
.date-input {
  padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text); font-family: var(--mono);
  font-size: 12px; cursor: pointer; outline: none; transition: border-color .15s;
}
.date-input:focus { border-color: var(--mint); }
.filter-count { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--bg3); padding: 4px 10px; border-radius: 8px; white-space: nowrap; }

/* ── MAIN GRID ── */
.main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }

/* ── CARD ── */
.card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; box-shadow: var(--shadow);
}
.card-head {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--text); }
.card-count {
  font-family: var(--mono); font-size: 11px; color: var(--mint);
  background: var(--mint-lt); border: 1px solid var(--mint-md);
  padding: 3px 10px; border-radius: 8px; font-weight: 500;
}
.card-body { padding: 24px; }

/* ── STARTUP LIST ── */
.startup-item {
  padding: 16px 0; border-bottom: 1px solid var(--border);
  animation: rise .35s ease both; cursor: default;
  transition: background .1s; margin: 0 -24px; padding: 16px 24px;
}
@keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.startup-item:last-child { border-bottom: none; }
.startup-item:hover { background: var(--bg); }
.startup-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 5px; }
.startup-name { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.startup-link { color: inherit; text-decoration: none; display: inline-flex; align-items: baseline; gap: 4px; }
.startup-link:hover { color: var(--mint); }
.startup-link:hover .link-arrow { opacity: 1; }
.link-arrow { font-size: 11px; color: var(--mint); opacity: 0; transition: opacity .15s; font-family: var(--sans); font-weight: 400; }
.startup-en { font-family: var(--sans); font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 6px; }
.startup-desc { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 6px; }
.startup-summary { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; padding: 10px 12px; background: var(--bg); border-left: 3px solid var(--mint-md); border-radius: 0 8px 8px 0; }
.startup-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

/* ── BADGES ── */
.badge { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.b-stage  { background: var(--blue-lt);   color: var(--blue);   border: 1px solid #bdd9f8; }
.b-score-hi { background: var(--mint-lt);  color: var(--mint);   border: 1px solid var(--mint-md); }
.b-score-md { background: var(--amber-lt); color: var(--amber);  border: 1px solid #f4d170; }
.b-score-lo { background: var(--bg3);      color: var(--muted);  border: 1px solid var(--border); }
.b-tag    { background: var(--bg3);        color: var(--text2);  border: 1px solid var(--border); }
.b-fund   { font-family: var(--mono); font-size: 11px; color: var(--text2); font-weight: 500; }

/* ── REGION BADGE ── */
.rb { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.rb-tw  { background: var(--mint-lt);   color: var(--mint);   border: 1px solid var(--mint-md); }
.rb-cn  { background: var(--coral-lt);  color: var(--coral);  border: 1px solid #f4b8a8; }
.rb-sea { background: var(--purple-lt); color: var(--purple); border: 1px solid #c5b9f8; }
.rb-gl  { background: var(--blue-lt);   color: var(--blue);   border: 1px solid #bdd9f8; }

/* ── RIGHT SIDEBAR ── */
.side-stack { display: flex; flex-direction: column; gap: 16px; }

/* ── CONTROL BUTTONS ── */
.btn-primary {
  width: 100%; padding: 14px; border-radius: 12px;
  border: none; background: linear-gradient(135deg, var(--mint) 0%, #00cec9 100%);
  color: white; font-family: var(--sans); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 14px rgba(0,184,148,.3);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,184,148,.4); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary {
  width: 100%; padding: 11px; border-radius: 12px;
  border: 1.5px solid var(--border2); background: transparent;
  color: var(--text2); font-family: var(--sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.btn-secondary:hover { border-color: var(--mint); color: var(--mint); background: var(--mint-lt); }

.region-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.btn-region {
  padding: 10px 6px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text2); font-family: var(--sans);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; text-align: center;
}
.btn-region:hover { border-color: var(--mint); background: var(--mint-lt); color: var(--mint); }
.btn-region:disabled { opacity: .45; cursor: not-allowed; }
.btn-process { border-color: var(--blue); color: var(--blue); }
.btn-process:hover { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }

.region-lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin: 14px 0 8px; }

/* ── PROGRESS ── */
.prog-wrap { margin-top: 14px; display: none; }
.prog-wrap.show { display: block; }
.prog-meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.prog-track { height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--mint), #00cec9); border-radius: 4px; animation: prog 3s linear infinite; }
@keyframes prog { 0%{width:5%} 80%{width:90%} 100%{width:95%} }

/* ── DIST BARS ── */
.dist-item { margin-bottom: 14px; }
.dist-item:last-child { margin-bottom: 0; }
.dist-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
.dist-key { font-size: 12px; color: var(--text2); font-weight: 500; }
.dist-val { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.dist-track { height: 5px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.dist-fill { height: 100%; border-radius: 4px; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* ── SPINNER ── */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--mint); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 13px; line-height: 2; }
.empty-icon { font-size: 32px; margin-bottom: 8px; opacity: .5; }

@media(max-width:960px){ .main-grid{grid-template-columns:1fr} .stats-row{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18"><path d="M9 2L16 5.5V12.5L9 16L2 12.5V5.5L9 2Z"/></svg>
    </div>
    <div>
      <div class="logo-name">Deal Sourcing</div>
      <div class="logo-tag">新創融資雷達系統</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="page">

  <!-- MSG -->
  <div class="msg" id="msg"></div>

  <!-- STATS -->
  <div class="sec-label">系統概覽</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">新創總數</div>
      <div class="stat-num mint" id="st-total"><span class="spinner"></span></div>
      <div class="stat-sub" id="st-high">高適配 — 家</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">平均適配分</div>
      <div class="stat-num" id="st-score"><span class="spinner"></span></div>
      <div class="stat-sub">滿分 10 分</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">台灣新創</div>
      <div class="stat-num mint" id="st-tw">—</div>
      <div class="stat-sub">筆資料</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">中國 ／ 東南亞</div>
      <div class="stat-num coral" id="st-overseas">—</div>
      <div class="stat-sub">筆資料</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">上次執行</div>
      <div class="stat-num amber" id="st-time" style="font-size:22px;padding-top:10px">—</div>
      <div class="stat-sub" id="st-dur">—</div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-lbl">日期</span>
    <input type="date" id="date-picker" class="date-input" onchange="loadFromFirebase()">
    <div class="filter-sep"></div>
    <span class="filter-lbl">地區</span>
    <div class="filter-group" id="region-filters">
      <button class="filter-btn active" data-region="">全部</button>
      <button class="filter-btn" data-region="台灣">🇹🇼 台灣</button>
      <button class="filter-btn region-cn" data-region="中國">🇨🇳 中國</button>
      <button class="filter-btn region-sea" data-region="東南亞">🌏 東南亞</button>
      <button class="filter-btn region-gl" data-region="全球">🌐 全球</button>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-lbl">產業</span>
    <div class="filter-group" id="industry-filters">
      <button class="filter-btn active" data-industry="">全部</button>
      <button class="filter-btn" data-industry="AI">AI</button>
      <button class="filter-btn" data-industry="FinTech">FinTech</button>
      <button class="filter-btn" data-industry="SaaS">SaaS</button>
      <button class="filter-btn" data-industry="Healthcare">醫療</button>
      <button class="filter-btn" data-industry="Mobility">Mobility</button>
      <button class="filter-btn" data-industry="Logistics">物流</button>
      <button class="filter-btn" data-industry="Ecommerce">電商</button>
    </div>
    <div class="filter-count" id="filter-count">— 筆</div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT: Startup List -->
    <div class="card">
      <div class="card-head">
        <div>
          <span class="card-title">新創列表</span>
          <span id="collection-label" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:10px"></span>
        </div>
        <span class="card-count" id="startup-count">— 筆</span>
      </div>
      <div class="card-body" id="startups-content">
        <div class="empty"><div class="empty-icon">🔍</div><span class="spinner"></span> 載入中...</div>
      </div>
    </div>

    <!-- RIGHT: Sidebar -->
    <div class="side-stack">

      <!-- Control -->
      <div class="card">
        <div class="card-head"><span class="card-title">爬蟲控制</span></div>
        <div class="card-body">
          <!-- STEP 1 -->
          <div class="region-lbl" style="margin-top:0;color:var(--mint)">① 爬蟲（存入 Sheets）</div>
          <div class="region-grid">
            <button class="btn-region" id="s-tw"  onclick="doScrape('台灣')">🇹🇼 台灣</button>
            <button class="btn-region" id="s-cn"  onclick="doScrape('中國')">🇨🇳 中國</button>
            <button class="btn-region" id="s-sea" onclick="doScrape('東南亞')">🌏 東南亞</button>
            <button class="btn-region" id="s-gl"  onclick="doScrape('全球')">🌐 全球</button>
          </div>

          <!-- STEP 2 -->
          <div class="region-lbl" style="color:var(--blue)">② 寫入 Firebase</div>
          <div class="region-grid">
            <button class="btn-region btn-process" id="p-tw"  onclick="doProcess('台灣')">🇹🇼 台灣</button>
            <button class="btn-region btn-process" id="p-cn"  onclick="doProcess('中國')">🇨🇳 中國</button>
            <button class="btn-region btn-process" id="p-sea" onclick="doProcess('東南亞')">🌏 東南亞</button>
            <button class="btn-region btn-process" id="p-gl"  onclick="doProcess('全球')">🌐 全球</button>
          </div>

          <button class="btn-secondary" onclick="loadAll()">↺ 重新整理資料</button>

          <div class="prog-wrap" id="progress-wrap">
            <div class="prog-meta">
              <span id="prog-label-text">執行中...</span>
              <span id="elapsed">0s</span>
            </div>
            <div class="prog-track"><div class="prog-fill"></div></div>
          </div>
        </div>
      </div>

      <!-- Region dist -->
      <div class="card">
        <div class="card-head"><span class="card-title">地區分佈</span></div>
        <div class="card-body" id="region-dist">
          <div class="empty" style="padding:12px 0"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Stage dist -->
      <div class="card">
        <div class="card-head"><span class="card-title">輪次分佈</span></div>
        <div class="card-body" id="stage-dist">
          <div class="empty" style="padding:12px 0"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Industry dist -->
      <div class="card">
        <div class="card-head"><span class="card-title">熱門產業</span></div>
        <div class="card-body" id="industry-dist">
          <div class="empty" style="padding:12px 0"><span class="spinner"></span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
var PROJECT_ID = 'web-claw-b779f';
var API_KEY    = 'AIzaSyD46bSwTlD1g94Nc-tqWDfM6MqIY3giE-w';
var GAS_URL    = 'https://script.google.com/macros/s/AKfycbwRe2j2PePE1DMSDxFlYpRS-6FiLzednK3mdcQyIluKLZ3SqSBVJE7eesApoYbpZdJicg/exec';
var FIRESTORE  = 'https://firestore.googleapis.com/v1/projects/'+PROJECT_ID+'/databases/(default)/documents';

var ALL_STARTUPS = [];
var activeRegion   = '';
var activeIndustry = '';

// Clock
function tick(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-TW',{hour12:false}); }
tick(); setInterval(tick,1000);

window.addEventListener('load', function(){
  // 設定日期選擇器預設為今天（台北時間）
  var picker = document.getElementById('date-picker');
  if (picker) picker.value = getTodayStr();
  loadAll();
});

function loadAll(){ loadFromFirebase(); loadStats(); }

// ── Firebase 直讀 ──
function fromValue(v){
  if(!v) return null;
  if(v.nullValue!==undefined) return null;
  if(v.booleanValue!==undefined) return v.booleanValue;
  if(v.integerValue!==undefined) return parseInt(v.integerValue,10);
  if(v.doubleValue!==undefined)  return v.doubleValue;
  if(v.stringValue!==undefined)  return v.stringValue;
  if(v.arrayValue!==undefined)   return (v.arrayValue.values||[]).map(fromValue);
  if(v.mapValue!==undefined)     return fromFields(v.mapValue.fields);
  return null;
}
function fromFields(f){ if(!f) return {}; var r={}; Object.keys(f).forEach(function(k){r[k]=fromValue(f[k]);}); return r; }

function firestoreQuery(col, extra){
  var url = FIRESTORE+':runQuery?key='+API_KEY;
  var q   = Object.assign({ from:[{collectionId:col}] }, extra||{});
  return fetch(url,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({structuredQuery:q}) })
    .then(function(r){return r.json();});
}

function getCollectionName() {
  // 回傳選擇的日期對應的 collection
  var dateEl = document.getElementById('date-picker');
  var date = dateEl ? dateEl.value : getTodayStr();
  return 'startups_' + date;
}

function getTodayStr() {
  var d = new Date();
  var tz = new Date(d.toLocaleString('en-US', {timeZone: 'Asia/Taipei'}));
  return tz.getFullYear() + '-' +
    String(tz.getMonth()+1).padStart(2,'0') + '-' +
    String(tz.getDate()).padStart(2,'0');
}

function loadFromFirebase(){
  var col = getCollectionName();
  document.getElementById('collection-label').textContent = col;
  firestoreQuery(col,{
    orderBy:[{field:{fieldPath:'extractedAt'},direction:'DESCENDING'}],
    limit:100
  }).then(function(result){
    ALL_STARTUPS = [];
    if(Array.isArray(result)) result.forEach(function(item){
      if(item.document) ALL_STARTUPS.push(fromFields(item.document.fields));
    });
    renderStartups();
    renderRegionStats();
  }).catch(function(e){
    document.getElementById('startups-content').innerHTML =
      '<div class="empty" style="color:var(--red)">載入失敗<br><span style="font-size:10px">'+e.message+'</span></div>';
  });
}

// ── 篩選 ──
document.getElementById('region-filters').addEventListener('click', function(e){
  var btn = e.target.closest('.filter-btn'); if(!btn) return;
  document.querySelectorAll('#region-filters .filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  activeRegion = btn.dataset.region;
  renderStartups();
});

document.getElementById('industry-filters').addEventListener('click', function(e){
  var btn = e.target.closest('.filter-btn'); if(!btn) return;
  document.querySelectorAll('#industry-filters .filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  activeIndustry = btn.dataset.industry;
  renderStartups();
});

function getFiltered(){
  return ALL_STARTUPS.filter(function(s){
    if(activeRegion && s.region !== activeRegion) return false;
    if(activeIndustry){
      var inds = (s.industry||[]).concat(s.fitTags||[]).map(function(i){return i.toLowerCase();});
      if(inds.indexOf(activeIndustry.toLowerCase())===-1) return false;
    }
    return true;
  });
}

// ── 渲染新創列表 ──
function renderStartups(){
  var filtered = getFiltered();
  var countEl  = document.getElementById('startup-count');
  var filterEl = document.getElementById('filter-count');
  countEl.textContent  = filtered.length + ' 筆';
  filterEl.textContent = filtered.length + ' / ' + ALL_STARTUPS.length + ' 筆';

  if(filtered.length===0){
    document.getElementById('startups-content').innerHTML =
      '<div class="empty">無符合條件的新創<br><span style="font-size:10px">調整篩選條件或執行爬蟲</span></div>';
    return;
  }

  document.getElementById('startups-content').innerHTML = filtered.map(function(s,i){
    var score   = parseFloat(s.fitScore)||0;
    var scoreCls= score>=8?'badge b-score-hi':score>=5?'badge b-score-md':'badge b-score-lo';
    var regionCls= s.region==='台灣'?'rb rb-tw':s.region==='中國'?'rb rb-cn':s.region==='東南亞'?'rb rb-sea':'rb rb-gl';
    var tags    = (s.fitTags||[]).slice(0,3).map(function(t){return '<span class="badge b-tag">'+t+'</span>';}).join('');
    var stage   = s.stage?'<span class="badge b-stage">'+s.stage+'</span>':'';
    var fund    = s.fundingAmountRaw?'<span class="b-fund">'+s.fundingAmountRaw+'</span>':'';
    var nameHtml = s.sourceUrl
      ? '<a href="'+s.sourceUrl+'" target="_blank" rel="noopener" class="startup-link">'+
          (s.companyName||'未知公司')+
          (s.companyNameEn?' <span class="startup-en">/ '+s.companyNameEn+'</span>':'')+
          ' <span class="link-arrow">↗</span>'+
        '</a>'
      : (s.companyName||'未知公司')+(s.companyNameEn?' <span class="startup-en">/ '+s.companyNameEn+'</span>':'');

    return '<div class="startup-item" style="animation-delay:'+(i*0.03)+'s">'+
      '<div class="startup-top">'+
        '<div class="startup-name">'+nameHtml+'</div>'+
        '<span class="'+regionCls+'">'+(s.region||'—')+'</span>'+
      '</div>'+
      '<div class="startup-desc">'+(s.description||'暫無描述')+'</div>'+
      (s.summary ? '<div class="startup-summary">'+s.summary+'</div>' : '')+
      '<div class="startup-row">'+stage+'<span class="badge '+scoreCls+'">適配 '+score+'</span>'+fund+tags+'</div>'+
      '</div>';
  }).join('');
}

// ── 統計 ──
function loadStats(){
  var col = getCollectionName();
  firestoreQuery(col,{
    select:{fields:[{fieldPath:'fitScore'},{fieldPath:'stage'},{fieldPath:'region'},{fieldPath:'industry'},{fieldPath:'fitTags'}]},
    limit:200
  }).then(function(result){
    var all=[];
    if(Array.isArray(result)) result.forEach(function(item){ if(item.document) all.push(fromFields(item.document.fields)); });

    var total = all.length;
    var scores= all.map(function(s){return parseFloat(s.fitScore)||0;});
    var avg   = total?( scores.reduce(function(a,b){return a+b;},0)/total ).toFixed(1):'0';
    var high  = scores.filter(function(s){return s>=7;}).length;

    document.getElementById('st-total').textContent = total;
    document.getElementById('st-score').textContent = avg+' / 10';
    document.getElementById('st-high').textContent  = '高適配（≥7）'+high+' 家';

    var tw  = all.filter(function(s){return s.region==='台灣';}).length;
    var ovs = all.filter(function(s){return s.region==='中國'||s.region==='東南亞';}).length;
    document.getElementById('st-tw').textContent       = tw;
    document.getElementById('st-overseas').textContent = ovs;

    renderDist('stage-dist',   buildDist(all,'stage'),    'var(--blue)');
    renderDist('industry-dist',buildIndustryDist(all),    'var(--mint)');
  });
}

function renderRegionStats(){
  var regions = {'台灣':'#63b3ed','中國':'#fc8181','東南亞':'#b794f4','全球':' var(--amber)'};
  var dist = {};
  ALL_STARTUPS.forEach(function(s){ var r=s.region||'全球'; dist[r]=(dist[r]||0)+1; });
  var max = Math.max.apply(null, Object.values(dist).concat([1]));
  document.getElementById('region-dist').innerHTML = '<div class="dist-row">'+
    Object.keys(regions).map(function(r){
      var c=dist[r]||0, pct=Math.round(c/max*100);
      var col=regions[r];
      return '<div class="dist-item">'+
        '<div class="dist-label"><span style="color:var(--muted)">'+r+'</span><span style="color:var(--text)">'+c+'</span></div>'+
        '<div class="dist-bar"><div class="dist-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
        '</div>';
    }).join('');
}

function buildDist(arr, field){
  var d={};
  arr.forEach(function(s){ var v=s[field]; if(v) d[v]=(d[v]||0)+1; });
  return d;
}
function buildIndustryDist(arr){
  var d={};
  arr.forEach(function(s){
    (s.industry||[]).concat(s.fitTags||[]).forEach(function(t){ if(t) d[t]=(d[t]||0)+1; });
  });
  return d;
}
function renderDist(id, dist, color){
  var keys=Object.keys(dist).sort(function(a,b){return dist[b]-dist[a];}).slice(0,6);
  if(!keys.length){ document.getElementById(id).innerHTML='<div class="empty" style="padding:10px 0;font-size:11px">尚無資料</div>'; return; }
  var max=Math.max.apply(null,keys.map(function(k){return dist[k];}));
  document.getElementById(id).innerHTML = keys.map(function(k){
    var pct=Math.round(dist[k]/max*100);
    return '<div class="dist-item">'+
      '<div class="dist-meta"><span class="dist-key">'+k+'</span><span class="dist-val">'+dist[k]+'</span></div>'+
      '<div class="dist-bar"><div class="dist-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
      '</div>';
  }).join('')+'</div>';
}

// ── 爬蟲觸發 ──
var crawlerTimer=null, crawlerSecs=0;

// ── Step 1: 爬蟲 → Sheets（用 CORS-friendly proxy）──
function doScrape(region) {
  var emoji = {'台灣':'🇹🇼','中國':'🇨🇳','東南亞':'🌏','全球':'🌐'};
  lockBtns(true);
  startTimer('① 爬取 ' + (emoji[region]||region) + ' 新聞...');
  showMsg('⏳ 正在爬取 ' + region + ' 新聞到 Google Sheets...', 'info');

  fetch('/api/proxy', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ action: 'scrape_only', region: region })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    stopTimer();
    lockBtns(false);
    if (data.status === 'success') {
      showMsg(
        '✅ <b>' + region + '</b> 爬蟲完成！新增 <b>' + data.newArticles + '</b> 篇文章（共 ' + data.total + ' 篇）。<br>' +
        '👇 現在點「② 寫入 Firebase」把資料倒進資料庫。',
        'ok'
      );
    } else {
      showMsg('❌ 爬蟲失敗：' + (data.message||'未知錯誤'), 'err');
    }
  })
  .catch(function(e) {
    stopTimer();
    lockBtns(false);
    showMsg('❌ 連線失敗：' + e.message, 'err');
  });
}

// ── Step 2: Sheets → Gemini → Firebase ──
function doProcess(region) {
  var emoji = {'台灣':'🇹🇼','中國':'🇨🇳','東南亞':'🌏','全球':'🌐'};
  lockBtns(true);
  startTimer('② AI 萃取 ' + (emoji[region]||region) + ' 寫入 Firebase...');
  showMsg('⏳ Gemini 分析中，約 3–6 分鐘，請耐心等待...', 'info');

  fetch('/api/proxy', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: new URLSearchParams({ action: 'process_only', region: region })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    stopTimer();
    lockBtns(false);
    if (data.status === 'success') {
      var remaining = data.remaining || 0;
      var msg = '✅ <b>' + region + '</b> 本批完成！新增 <b>' + data.saved + '</b> 筆新創。';
      if (remaining > 0) {
        msg += '<br>📋 Sheets 還有 <b>' + remaining + '</b> 篇未處理。' +
               '<button onclick="doProcess('' + region + '')" style="margin-left:10px;padding:4px 12px;' +
               'background:var(--blue);color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px">' +
               '繼續下一批 ▶</button>';
        showMsg(msg, 'info');
      } else {
        msg += '<br>✓ 本日 Sheets 全部處理完畢！';
        showMsg(msg, 'ok');
      }
      setTimeout(loadAll, 1500);
    } else {
      showMsg('❌ 寫入失敗：' + (data.message||'未知錯誤'), 'err');
    }
  })
  .catch(function(e) {
    stopTimer();
    lockBtns(false);
    showMsg('❌ 連線失敗：' + e.message, 'err');
  });
}

// ── 工具 ──
function lockBtns(lock) {
  document.querySelectorAll('.btn-region, #trigger-btn').forEach(function(b){ b.disabled=lock; });
}
function startTimer(label) {
  crawlerSecs = 0;
  document.getElementById('progress-wrap').classList.add('show');
  document.getElementById('prog-label-text').textContent = label;
  crawlerTimer = setInterval(function(){ crawlerSecs++; document.getElementById('elapsed').textContent=crawlerSecs+'s'; }, 1000);
}
function stopTimer() {
  clearInterval(crawlerTimer);
  document.getElementById('progress-wrap').classList.remove('show');
}
function showMsg(text,type){ var el=document.getElementById('msg'); el.className='msg show '+type; el.innerHTML=text; }
function triggerCrawler(){
  var btn=document.getElementById('trigger-btn'), prog=document.getElementById('progress-wrap');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 執行中...';
  prog.classList.add('show'); crawlerSecs=0;
  showMsg('⏳ 爬蟲執行中，預計 2–3 分鐘...','info');
  crawlerTimer=setInterval(function(){ crawlerSecs++; document.getElementById('elapsed').textContent=crawlerSecs+'s'; },1000);
  fetch(GAS_URL,{ method:'POST', mode:'no-cors', body:new URLSearchParams({action:'trigger'}) })
    .then(function(){
      clearInterval(crawlerTimer); btn.disabled=false; btn.innerHTML='▶ 立即執行爬蟲'; prog.classList.remove('show');
      showMsg('✓ 爬蟲已觸發（'+crawlerSecs+'秒）。3 分鐘後點重新整理查看結果。','ok');
    }).catch(function(e){
      clearInterval(crawlerTimer); btn.disabled=false; btn.innerHTML='▶ 立即執行爬蟲'; prog.classList.remove('show');
      showMsg('✗ 失敗：'+e.message,'err');
    });
}
